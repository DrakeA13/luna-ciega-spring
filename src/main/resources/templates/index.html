<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Luna Ciega</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
        }

        body{

        background:
        linear-gradient(
        rgba(0,0,0,.65),
        rgba(0,0,0,.75)
        ),

        url("https://images.unsplash.com/photo-1622286342621-4bd786c2447c");

        background-size:cover;

        background-position:center;

        height:100vh;

        color:white;

        display:flex;

        justify-content:center;

        align-items:center;

        }

        .contenedor{

        text-align:center;

        }

        h1{

        font-size:70px;

        margin-bottom:20px;

        }

        p{

        font-size:20px;

        margin-bottom:40px;

        opacity:.9;

        }

        .boton{

        background:#c79a57;

        color:white;

        padding:18px 50px;

        border:none;

        border-radius:12px;

        font-size:18px;

        cursor:pointer;

        transition:.3s;

        text-decoration:none;

        display:inline-block;

        }

        .boton:hover{

        transform:scale(1.05);

        background:#ddb06f;

        }

    </style>

</head>

<body>

<div class="contenedor">

    <h1>Luna Ciega</h1>

    <p>
        Reserva tu cita de barbería y tatuajes
    </p>

    <a
            href="/servicios"
            class="boton"
    >

        Ver Servicios

    </a>

    <br><br>

    <a href="/mis-citas">

        <button>

            Ver mis citas

        </button>

    </a>

</div>

</body>

</html>

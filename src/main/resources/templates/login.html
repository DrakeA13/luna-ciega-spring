<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <title>Login</title>

    <style>

        body{

        background:#111;

        font-family:Arial;

        display:flex;

        justify-content:center;

        align-items:center;

        height:100vh;

        }

        .card{

        background:#222;

        padding:40px;

        border-radius:20px;

        width:400px;

        }

        h1{

        color:white;

        text-align:center;

        }

        input{

        width:100%;

        padding:15px;

        margin-top:20px;

        border:none;

        border-radius:10px;

        }

        button{

        margin-top:25px;

        width:100%;

        padding:15px;

        background:gold;

        border:none;

        border-radius:10px;

        font-size:18px;

        cursor:pointer;

        }

        button:hover{

        opacity:.9;

        }

    </style>

</head>

<body>

<div class="card">

    <h1>

        Iniciar sesión

    </h1>

    <form id="form">

        <input
                id="correo"
                type="email"
                placeholder="Correo"
                required
        >

        <input
                id="contrasena"
                type="password"
                placeholder="Contraseña"
                required
        >

        <button
                type="submit"
        >

            Entrar

        </button>

    </form>

</div>

<script>

    document
    .getElementById(
    "form"
    )

    .addEventListener(

    "submit",

    async(e)=>{

    e.preventDefault();

    const datos={

    correo:
    document
    .getElementById(
    "correo"
    )
    .value,

    contrasena:
    document
    .getElementById(
    "contrasena"
    )
    .value

    };

    try{

    const r=

    await fetch(

    "/api/auth/login",

    {

    method:"POST",

    headers:{

    "Content-Type":
    "application/json"

    },

    body:
    JSON.stringify(
    datos
    )

    }

    );

    if(r.ok){

    const usuario=

    await r.json();

    localStorage.setItem(

    "usuario",

    JSON.stringify(
    usuario
    )

    );

    alert(

    "Bienvenido "

    +

    usuario.nombre

    );

    window.location="/";

    }

    else{

    alert(

    "Correo o contraseña incorrecta"

    );

    }

    }

    catch(error){

    alert(

    "No se pudo conectar con el servidor"

    );

    console.log(
    error
    );

    }

    }

    );

</script>

</body>

</html>

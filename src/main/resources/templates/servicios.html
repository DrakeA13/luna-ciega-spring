<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Servicios</title>

    <style>

        body{
        background:#111;
        color:white;
        font-family:Arial;
        padding:40px;
        }

        h1{
        text-align:center;
        margin-bottom:40px;
        }

        .grid{

        display:flex;

        gap:20px;

        flex-wrap:wrap;

        justify-content:center;

        }

        .card{

        background:#222;

        padding:25px;

        width:300px;

        border-radius:20px;

        }

        .precio{

        color:gold;

        font-size:30px;

        }

        button{

        margin-top:20px;

        width:100%;

        padding:15px;

        background:gold;

        border:none;

        border-radius:10px;

        }

    </style>

</head>

<body>

<h1>Servicios</h1>

<div class="grid">

    <div
            class="card"

            th:each="s : ${servicios}"
    >

        <h2
                th:text="${s.nombre}"
        ></h2>

        <p
                th:text="${s.descripcion}"
        ></p>

        <div
                class="precio"

                th:text="'$'+${s.precio}"

        ></div>

        <p>

            Duración:

            <span
                    th:text="${s.duracionMinutos}"
            ></span>

            min

        </p>

        <a
                th:href="'/agendar?id='+${s.idServicio}"
        >

            <button>

                Agendar

            </button>

        </a>

    </div>

</div>

<a
        href="/"

        style="

position:fixed;

bottom:90px;

right:60px;

background:#D4A15B;

color:white;

padding:18px 35px;

border-radius:18px;

text-decoration:none;

font-size:22px;

font-weight:bold;

box-shadow:0 15px 35px rgba(0,0,0,.35);

z-index:99999;

"

>

    🏠 Inicio

</a>

</body>

</html>

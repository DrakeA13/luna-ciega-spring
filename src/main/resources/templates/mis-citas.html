<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>Mis citas</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        }

        body{
        background:#111;
        color:white;
        font-family:Arial;
        padding:40px;
        }

        h1{
        text-align:center;
        font-size:50px;
        margin-bottom:50px;
        color:#d9a55a;
        }

        #contenedor{
        max-width:900px;
        margin:auto;
        display:flex;
        flex-direction:column;
        gap:25px;
        }

        .card{

        background:rgba(255,255,255,.05);

        backdrop-filter:blur(10px);

        border:1px solid rgba(255,255,255,.1);

        padding:30px;

        border-radius:25px;

        transition:.3s;

        }

        .card:hover{

        transform:translateY(-5px);

        }

        .servicio{

        font-size:32px;

        color:#d9a55a;

        margin-bottom:20px;

        }

        .info{

        margin-bottom:12px;

        font-size:20px;

        }

        .estado{

        display:inline-block;

        padding:10px 18px;

        border-radius:20px;

        font-weight:bold;

        margin-top:15px;

        }

        .pendiente{

        background:#ffd95a;

        color:black;

        }

        .confirmada{

        background:#52ff89;

        color:black;

        }

        .cancelada{

        background:#ff5252;

        }

        button{

        margin-top:25px;

        width:100%;

        padding:18px;

        background:#d63d3d;

        color:white;

        border:none;

        border-radius:15px;

        font-size:18px;

        cursor:pointer;

        }

        button:hover{

        opacity:.9;

        }

    </style>

</head>

<body>

<h1>

    Mis citas

</h1>

<div id="contenedor">

</div>

<script>

    function fechaBonita(fecha){

    return new Date(
    fecha
    ).toLocaleString(
    "es-MX"
    );

    }

    async function cargar(){

    const usuario=

    JSON.parse(
    localStorage.getItem(
    "usuario"
    )
    );

    const r=

    await fetch(

    "/api/citas/usuario/"

    +

    usuario.idUsuario

    );

    const citas=

    await r.json();

    let html="";

    if(
    citas.length===0
    ){

    html=`

    <div class="card">

    No tienes citas registradas

    </div>

    `;

    }

    citas.forEach(c=>{

    let clase="pendiente";

    if(
    c.estado==="CONFIRMADA"
    ){

    clase="confirmada";

    }

    if(
    c.estado==="CANCELADA"
    ){

    clase="cancelada";

    }

    html+=`

    <div class="card">

    <div class="servicio">

    ✂️
    ${c.servicio.nombre}

    </div>

    <div class="info">

    📅
    ${fechaBonita(
    c.fechaHoraInicio
    )}

    </div>

    <div class="info">

    🕐
    ${fechaBonita(
    c.fechaHoraFin
    )}

    </div>

    <div class="info">

    📝
    ${c.notas}

    </div>

    <div class="estado ${clase}">

    ${c.estado}

    </div>

    <br>

    <button
    onclick="
    cancelar(
    ${c.idCita}
    )
    "
    >

    Cancelar cita

    </button>

    </div>

    `;

    });

    document
    .getElementById(
    "contenedor"
    )
    .innerHTML=
    html;

    }

    async function cancelar(id){

    const ok=
    confirm(
    "¿Cancelar cita?"
    );

    if(
    !ok
    )
    return;

    await fetch(

    "/api/citas/"

    +

    id,

    {

    method:
    "DELETE"

    }

    );

    location.reload();

    }

    cargar();

</script>
<a
        href="/"

        style="

position:fixed;

bottom:90px;

right:60px;

background:#D4A15B;

color:white;

padding:18px 35px;

border-radius:18px;

text-decoration:none;

font-size:22px;

font-weight:bold;

box-shadow:0 15px 35px rgba(0,0,0,.35);

z-index:99999;

"

>

    🏠 Inicio

</a>

<script src="/js/auth.js"></script>

<script>

    proteger(
    "CLIENTE"
    );

</script>

</body>


</html>
